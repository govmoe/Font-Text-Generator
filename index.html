<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体图片生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area i {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #888;
            font-size: 0.9rem;
        }

        #fontInput {
            display: none;
        }

        .font-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .font-info.show {
            display: block;
        }

        .font-name {
            font-weight: bold;
            color: #333;
        }

        .controls {
            margin-top: 25px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .control-group input[type="text"],
        .control-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .control-group input[type="text"]:focus,
        .control-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .control-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .control-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }

        .control-group input[type="color"] {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .range-value {
            display: inline-block;
            margin-left: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal !important;
            gap: 10px;
        }

        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .preview-section {
            margin-top: 30px;
            text-align: center;
        }

        .preview-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        #previewCanvas {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-group {
            margin-top: 25px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .icon-upload::before {
            content: "📁";
            font-size: 48px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .upload-area {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>字体图片生成器</h1>
        <p class="subtitle">上传字体文件，生成精美的文本图片</p>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <span class="icon-upload"></span>
                <p class="upload-text">点击或拖拽上传字体文件</p>
                <p class="upload-hint">支持 .ttf, .otf, .woff, .woff2 格式</p>
            </div>
            <input type="file" id="fontInput" accept=".ttf,.otf,.woff,.woff2">
            
            <div class="font-info" id="fontInfo">
                <span class="font-name" id="fontName"></span>
            </div>
        </div>

        <div class="card hidden" id="controlsCard">
            <div class="controls">
                <div class="control-group">
                    <label for="textInput">输入文本</label>
                    <textarea id="textInput" placeholder="请输入要生成图片的文本...">Hello World
你好，世界</textarea>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label for="fontSize">字体大小 <span class="range-value" id="fontSizeValue">60</span>px</label>
                        <input type="range" id="fontSize" min="12" max="200" value="60">
                    </div>

                    <div class="control-group">
                        <label for="lineHeight">行高 <span class="range-value" id="lineHeightValue">1.5</span></label>
                        <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.5">
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label for="textColor">文字颜色</label>
                        <input type="color" id="textColor" value="#333333">
                    </div>

                    <div class="control-group">
                        <label for="bgColor">背景颜色</label>
                        <input type="color" id="bgColor" value="#ffffff">
                    </div>

                    <div class="control-group">
                        <label for="padding">内边距 <span class="range-value" id="paddingValue">40</span>px</label>
                        <input type="range" id="padding" min="0" max="100" value="40">
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="transparentBg" checked>
                            <span>透明背景（下载时）</span>
                        </label>
                    </div>

                    <div class="control-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="autoCrop" checked>
                            <span>自动裁剪（去除多余透明区域）</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <p class="preview-title">预览</p>
                <canvas id="previewCanvas"></canvas>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="downloadBtn">
                    下载图片
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    重置
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fontInput = document.getElementById('fontInput');
        const fontInfo = document.getElementById('fontInfo');
        const fontName = document.getElementById('fontName');
        const controlsCard = document.getElementById('controlsCard');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = previewCanvas.getContext('2d');

        // 控制元素
        const textInput = document.getElementById('textInput');
        const fontSizeInput = document.getElementById('fontSize');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const lineHeightInput = document.getElementById('lineHeight');
        const lineHeightValue = document.getElementById('lineHeightValue');
        const textColorInput = document.getElementById('textColor');
        const bgColorInput = document.getElementById('bgColor');
        const paddingInput = document.getElementById('padding');
        const paddingValue = document.getElementById('paddingValue');
        const transparentBgInput = document.getElementById('transparentBg');
        const autoCropInput = document.getElementById('autoCrop');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let currentFont = null;
        let fontFace = null;

        // 上传区域点击
        uploadArea.addEventListener('click', () => fontInput.click());

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFontFile(files[0]);
            }
        });

        // 文件选择
        fontInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFontFile(e.target.files[0]);
            }
        });

        // 处理字体文件
        async function handleFontFile(file) {
            const validTypes = ['font/ttf', 'font/otf', 'font/woff', 'font/woff2', 
                               'application/x-font-ttf', 'application/x-font-opentype',
                               'application/font-woff', 'application/font-woff2'];
            const validExtensions = ['.ttf', '.otf', '.woff', '.woff2'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                alert('请上传有效的字体文件 (.ttf, .otf, .woff, .woff2)');
                return;
            }

            try {
                const arrayBuffer = await file.arrayBuffer();
                const fontUrl = URL.createObjectURL(new Blob([arrayBuffer]));
                
                // 创建字体名称
                const fontFamily = 'CustomFont_' + Date.now();
                
                // 移除旧的字体
                if (fontFace) {
                    document.fonts.delete(fontFace);
                }
                
                // 创建新的 FontFace
                fontFace = new FontFace(fontFamily, arrayBuffer);
                await fontFace.load();
                document.fonts.add(fontFace);
                
                currentFont = fontFamily;
                
                // 显示字体信息
                fontName.textContent = `已加载: ${file.name}`;
                fontInfo.classList.add('show');
                controlsCard.classList.remove('hidden');
                
                // 生成预览
                generatePreview();
                
            } catch (error) {
                console.error('字体加载失败:', error);
                alert('字体文件加载失败，请检查文件是否有效');
            }
        }

        // 计算文本边界框
        function getTextBoundingBox(text, fontSize, lineHeight, fontFamily) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `${fontSize}px "${fontFamily}"`;
            
            const lines = text.split('\n');
            let maxWidth = 0;
            let minY = Infinity;
            let maxY = -Infinity;
            
            lines.forEach((line, index) => {
                const metrics = ctx.measureText(line);
                maxWidth = Math.max(maxWidth, metrics.width);
                
                const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.8;
                const descent = metrics.actualBoundingBoxDescent || fontSize * 0.2;
                
                minY = Math.min(minY, -ascent);
                maxY = Math.max(maxY, descent);
            });
            
            const lineHeightPx = fontSize * lineHeight;
            const totalHeight = lines.length * lineHeightPx;
            
            return {
                width: maxWidth,
                height: totalHeight,
                textHeight: maxY - minY,
                lineHeightPx: lineHeightPx
            };
        }

        // 生成预览
        function generatePreview() {
            if (!currentFont) return;

            const text = textInput.value || ' ';
            const fontSize = parseInt(fontSizeInput.value);
            const lineHeight = parseFloat(lineHeightInput.value);
            const textColor = textColorInput.value;
            const bgColor = bgColorInput.value;
            const padding = parseInt(paddingInput.value);

            // 设置字体
            ctx.font = `${fontSize}px "${currentFont}"`;
            
            // 计算文本尺寸
            const lines = text.split('\n');
            let maxWidth = 0;
            const lineMetrics = lines.map(line => {
                const metrics = ctx.measureText(line);
                maxWidth = Math.max(maxWidth, metrics.width);
                return {
                    text: line,
                    width: metrics.width,
                    actualBoundingBoxAscent: metrics.actualBoundingBoxAscent || fontSize * 0.8,
                    actualBoundingBoxDescent: metrics.actualBoundingBoxDescent || fontSize * 0.2
                };
            });

            const lineHeightPx = fontSize * lineHeight;
            const totalHeight = lineMetrics.length * lineHeightPx;
            
            // 设置画布尺寸
            const canvasWidth = Math.max(maxWidth + padding * 2, 300);
            const canvasHeight = totalHeight + padding * 2;
            
            previewCanvas.width = canvasWidth;
            previewCanvas.height = canvasHeight;

            // 绘制背景
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // 绘制文本
            ctx.fillStyle = textColor;
            ctx.font = `${fontSize}px "${currentFont}"`;
            ctx.textBaseline = 'middle';

            const startY = padding + lineHeightPx / 2;
            lineMetrics.forEach((line, index) => {
                const x = padding + (maxWidth - line.width) / 2; // 水平居中
                const y = startY + index * lineHeightPx;
                ctx.fillText(line.text, x, y);
            });
        }

        // 生成最终图片（带透明背景和裁剪）
        function generateFinalImage() {
            if (!currentFont) return null;

            const text = textInput.value || ' ';
            const fontSize = parseInt(fontSizeInput.value);
            const lineHeight = parseFloat(lineHeightInput.value);
            const textColor = textColorInput.value;
            const padding = parseInt(paddingInput.value);
            const isTransparent = transparentBgInput.checked;
            const shouldCrop = autoCropInput.checked;

            // 创建临时画布
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `${fontSize}px "${currentFont}"`;
            
            // 计算文本尺寸
            const lines = text.split('\n');
            let maxWidth = 0;
            let maxAscent = 0;
            let maxDescent = 0;
            
            const lineMetrics = lines.map(line => {
                const metrics = ctx.measureText(line);
                maxWidth = Math.max(maxWidth, metrics.width);
                const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.8;
                const descent = metrics.actualBoundingBoxDescent || fontSize * 0.2;
                maxAscent = Math.max(maxAscent, ascent);
                maxDescent = Math.max(maxDescent, descent);
                return {
                    text: line,
                    width: metrics.width,
                    ascent: ascent,
                    descent: descent
                };
            });

            const lineHeightPx = fontSize * lineHeight;
            const textHeight = maxAscent + maxDescent;
            const totalTextHeight = (lines.length - 1) * lineHeightPx + textHeight;
            
            // 设置画布尺寸
            const canvasWidth = maxWidth + padding * 2;
            const canvasHeight = totalTextHeight + padding * 2;
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;

            // 清空画布（透明背景）
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            // 如果不是透明背景，绘制背景色
            if (!isTransparent) {
                ctx.fillStyle = bgColorInput.value;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }

            // 绘制文本
            ctx.fillStyle = textColor;
            ctx.font = `${fontSize}px "${currentFont}"`;
            ctx.textBaseline = 'alphabetic';

            const startY = padding + maxAscent;
            lineMetrics.forEach((line, index) => {
                const x = padding + (maxWidth - line.width) / 2;
                const y = startY + index * lineHeightPx;
                ctx.fillText(line.text, x, y);
            });

            // 如果需要裁剪（基于透明背景去除多余空白区域）
            if (shouldCrop && lines.length > 0 && isTransparent) {
                try {
                    const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
                    const data = imageData.data;
                    let minX = canvasWidth, minY = canvasHeight, maxX = 0, maxY = 0;
                    let hasContent = false;

                    // 扫描所有像素，找到非透明区域的边界
                    for (let y = 0; y < canvasHeight; y++) {
                        for (let x = 0; x < canvasWidth; x++) {
                            const alpha = data[(y * canvasWidth + x) * 4 + 3];
                            if (alpha > 0) {
                                minX = Math.min(minX, x);
                                minY = Math.min(minY, y);
                                maxX = Math.max(maxX, x);
                                maxY = Math.max(maxY, y);
                                hasContent = true;
                            }
                        }
                    }

                    if (hasContent) {
                        // 添加小边距
                        const cropPadding = 2;
                        minX = Math.max(0, minX - cropPadding);
                        minY = Math.max(0, minY - cropPadding);
                        maxX = Math.min(canvasWidth - 1, maxX + cropPadding);
                        maxY = Math.min(canvasHeight - 1, maxY + cropPadding);

                        const cropWidth = maxX - minX + 1;
                        const cropHeight = maxY - minY + 1;

                        // 创建裁剪后的画布
                        const croppedCanvas = document.createElement('canvas');
                        croppedCanvas.width = cropWidth;
                        croppedCanvas.height = cropHeight;
                        const croppedCtx = croppedCanvas.getContext('2d');

                        croppedCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                        return croppedCanvas;
                    }
                } catch (e) {
                    console.error('裁剪失败:', e);
                }
            }

            return canvas;
        }

        // 更新范围值显示
        fontSizeInput.addEventListener('input', (e) => {
            fontSizeValue.textContent = e.target.value;
            generatePreview();
        });

        lineHeightInput.addEventListener('input', (e) => {
            lineHeightValue.textContent = e.target.value;
            generatePreview();
        });

        paddingInput.addEventListener('input', (e) => {
            paddingValue.textContent = e.target.value;
            generatePreview();
        });

        // 其他控制项
        textInput.addEventListener('input', generatePreview);
        textColorInput.addEventListener('input', generatePreview);
        bgColorInput.addEventListener('input', generatePreview);

        // 下载图片
        downloadBtn.addEventListener('click', () => {
            const finalCanvas = generateFinalImage();
            if (finalCanvas) {
                const link = document.createElement('a');
                link.download = 'font-image.png';
                link.href = finalCanvas.toDataURL('image/png');
                link.click();
            }
        });

        // 重置
        resetBtn.addEventListener('click', () => {
            textInput.value = 'Hello World\n你好，世界';
            fontSizeInput.value = 60;
            fontSizeValue.textContent = '60';
            lineHeightInput.value = 1.5;
            lineHeightValue.textContent = '1.5';
            textColorInput.value = '#333333';
            bgColorInput.value = '#ffffff';
            paddingInput.value = 40;
            paddingValue.textContent = '40';
            transparentBgInput.checked = true;
            autoCropInput.checked = true;
            generatePreview();
        });

        // 新选项变化时更新预览
        transparentBgInput.addEventListener('change', generatePreview);
        autoCropInput.addEventListener('change', generatePreview);
    </script>
</body>
</html>
